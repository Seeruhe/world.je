# Docker Compose configuration for OpenClaw Gateway
# This file sets up the OpenClaw Gateway service for AI-powered chat in WorkAdventure
#
# Usage:
#   docker-compose -f docker-compose.yaml -f docker-compose.openclaw.yaml up -d
#
# Environment variables (set in .env):
#   OPENCLAW_ENABLED=true
#   OPENCLAW_GATEWAY_URL=ws://openclaw-gateway:18789
#   OPENCLAW_API_KEY=your-api-key (optional)
#   OPENCLAW_DEFAULT_MODEL=anthropic/claude-3-5-sonnet-20241022
#
#   智谱 AI (GLM) 配置:
#   ANTHROPIC_AUTH_TOKEN=your-token
#   ANTHROPIC_BASE_URL=https://open.bigmodel.cn/api/anthropic

version: "3"
services:
  openclaw-gateway:
    image: thecodingmachine/nodejs:v2-20-bullseye
    container_name: workadventure-openclaw
    restart: unless-stopped
    working_dir: /app
    command: bash -c "npm install && npm start"
    volumes:
      - ./ai-gateway:/app
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      # OpenClaw configuration
      - OPENCLAW_PORT=18789
      - OPENCLAW_HOST=0.0.0.0
      # 智谱 AI (GLM) - Anthropic 兼容接口
      - ANTHROPIC_API_KEY=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      # 默认模型 (智谱 GLM-5)
      - OPENCLAW_DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-glm-5}
    networks:
      - workadventure-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.workadventure.service=openclaw"
      - "com.workadventure.description=OpenClaw AI Gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 更新 back 服务以接收 OpenClaw 环境变量
  back:
    environment:
      - OPENCLAW_ENABLED=${OPENCLAW_ENABLED:-false}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-gateway:18789}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - OPENCLAW_DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-glm-5}
      - OPENCLAW_TRIGGER_PREFIX=${OPENCLAW_TRIGGER_PREFIX:-@AI}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_AUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

networks:
  workadventure-network:
    name: workadventure-master_default
    external: true
